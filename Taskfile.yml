version: '3'

# PyTorch ships cuDNN 9, which the ONNX Runtime CUDA execution provider depends
# on (onnxruntime_providers_cuda.dll needs cudnn64_9.dll). GPU tasks below
# prepend torch's lib dir to PATH so the provider loads and inference runs on the
# GPU. Plain `cargo test`/`cargo run` stay on the CPU fallback, which is fine for
# tests; GPU-bound work (backend check, self-play) goes through these targets.
vars:
  TORCH_LIB: '{{.ROOT_DIR}}\train\.venv\Lib\site-packages\torch\lib'

tasks:
  build: { cmds: ["cargo build --workspace"] }
  test: { cmds: ["cargo test --workspace"] }
  bench: { cmds: ["cargo run -p kairnz-bench --"] }
  ui: { dir: ui, cmds: ["pnpm install", "pnpm tauri dev"] }

  # Verify the ONNX Runtime CUDA backend engages. Prints "backend: CUDA" when the
  # GPU path is wired correctly, or "backend: CPU (...)" if cuDNN is unavailable.
  # Runs via PowerShell so the backslash PATH survives (Task's sh strips them).
  onnx-check:
    cmds:
      - powershell -NoProfile -Command '$env:PATH = "{{.TORCH_LIB}};$env:PATH"; cargo run -p kairnz-onnx --bin backend_check'

  # Generate a self-play shard on the GPU. Override vars, e.g.
  #   task selfplay MODEL=path/to/model.onnx OUT=data/shard0.safetensors GAMES=16
  selfplay:
    vars:
      MODEL: '{{.MODEL | default "crates/kairnz-onnx/tests/fixtures/random_init.onnx"}}'
      OUT: '{{.OUT | default "selfplay-shard.safetensors"}}'
      GAMES: '{{.GAMES | default 8}}'
      SIMS: '{{.SIMS | default 200}}'
      SEED: '{{.SEED | default 0}}'
    cmds:
      - powershell -NoProfile -Command '$env:PATH = "{{.TORCH_LIB}};$env:PATH"; cargo run -p kairnz-selfplay --bin selfplay --release -- --model "{{.MODEL}}" --out "{{.OUT}}" --games {{.GAMES}} --simulations {{.SIMS}} --seed {{.SEED}}'

  # Train KairnzNet on self-play shards and export ONNX. Override vars, e.g.
  #   task train SHARDS=data OUT=models/iter1.onnx EPOCHS=20
  train:
    vars:
      SHARDS: '{{.SHARDS | default "data"}}'
      OUT: '{{.OUT | default "models/trained.onnx"}}'
      EPOCHS: '{{.EPOCHS | default 10}}'
    cmds:
      - powershell -NoProfile -Command '$env:PATH = "{{.TORCH_LIB}};$env:PATH"; cd train; uv run python scripts/train.py --shards "../{{.SHARDS}}" --out "../{{.OUT}}" --epochs {{.EPOCHS}}'

  # Run the full AlphaZero training loop (self-play -> train -> gate -> promote).
  # Long-running; override any dial, e.g.
  #   task loop ITERS=20 GAMES=64 SIMS=100 FILTERS=64 BLOCKS=5 THREADS=8
  loop:
    vars:
      WORK: '{{.WORK | default "loop-run"}}'
      ITERS: '{{.ITERS | default 10}}'
      GAMES: '{{.GAMES | default 64}}'
      SIMS: '{{.SIMS | default 200}}'
      GATE_GAMES: '{{.GATE_GAMES | default 40}}'
      EPOCHS: '{{.EPOCHS | default 10}}'
      FILTERS: '{{.FILTERS | default 64}}'
      BLOCKS: '{{.BLOCKS | default 5}}'
      THREADS: '{{.THREADS | default 0}}'
    cmds:
      - powershell -NoProfile -Command '$env:PATH = "{{.TORCH_LIB}};$env:PATH"; cd train; uv run python scripts/loop.py --work "../{{.WORK}}" --iterations {{.ITERS}} --selfplay-games {{.GAMES}} --selfplay-sims {{.SIMS}} --gate-games {{.GATE_GAMES}} --epochs {{.EPOCHS}} --filters {{.FILTERS}} --blocks {{.BLOCKS}} --threads {{.THREADS}}'

  # Open the live training status window (point it at the same WORK dir as the loop).
  status:
    vars:
      WORK: '{{.WORK | default "loop-run"}}'
    cmds:
      - powershell -NoProfile -Command 'cd train; uv run python scripts/status_window.py --work "../{{.WORK}}"'
